<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOTILIA — Prototype de navigation</title>
<style>
  :root{
    --ink:#595959; --muted:#8a8a8a; --line:#e2e2e2; --soft:#f4f4f4; --grey:#707070;
    --pro:#34a23d; --pro-bg:#ecf6ed;
    --part:#e95a28; --part-bg:#fdefe8;
    --accent:#e95a28;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#fafafa;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}

  /* Top bar */
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:12px 28px;
    display:flex;align-items:center;gap:24px;position:sticky;top:0;z-index:10}
  .brand-logo{height:42px;width:auto;cursor:pointer}
  .proto-label{display:flex;flex-direction:column;line-height:1.25;border-left:1px solid var(--line);padding-left:18px}
  .proto-label strong{font-size:13px;color:var(--grey);font-weight:700}
  .proto-label span{font-size:11px;color:var(--muted)}
  .brand{font-weight:800;letter-spacing:2px;font-size:18px}
  .brand small{font-weight:500;color:var(--muted);letter-spacing:.5px;font-size:11px;display:block}
  .switch{display:flex;gap:6px;margin-left:auto}
  .switch button{border:1px solid var(--line);background:#fff;border-radius:999px;
    padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
  .switch button.pro.active{background:var(--pro);color:#fff;border-color:var(--pro)}
  .switch button.part.active{background:var(--part);color:#fff;border-color:var(--part)}

  .layout{display:flex;max-width:1180px;margin:0 auto;padding:24px 28px;gap:28px;align-items:flex-start}

  /* Filters */
  aside{width:230px;flex:0 0 230px;background:#fff;border:1px solid var(--line);
    border-radius:14px;padding:18px 18px;position:sticky;top:84px}
  aside h3{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:0 0 12px}
  .fgroup{margin-bottom:18px}
  .fgroup .ftitle{font-size:12px;font-weight:700;margin-bottom:8px;color:var(--grey)}
  .fgroup.scroll{max-height:210px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px 10px}
  .fsub{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:8px 0 4px;font-weight:700}
  .fsub:first-child{margin-top:0}
  .fopt{display:flex;align-items:center;gap:8px;font-size:13px;padding:3px 0;cursor:pointer;color:#444}
  .fopt input{accent-color:var(--accent);cursor:pointer}
  .reset{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0}

  /* Main */
  main{flex:1;min-width:0}
  .crumb{font-size:13px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .crumb a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:600}
  .crumb a:hover{text-decoration:underline}
  .crumb .sep{color:#c2c8d0}
  h1{font-size:24px;margin:0 0 4px}
  .lead{color:var(--muted);font-size:14px;margin:0 0 22px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 16px;
    cursor:pointer;transition:.12s;display:flex;flex-direction:column;gap:6px}
  .card:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(20,30,50,.08);transform:translateY(-1px)}
  .card .t{font-weight:700;font-size:15px}
  .card .meta{font-size:12px;color:var(--muted)}
  .card .arrow{margin-top:auto;font-size:12px;color:var(--accent);font-weight:600}
  .card.pro{border-top:3px solid var(--pro)}
  .card.part{border-top:3px solid var(--part)}

  /* Product list */
  .plist{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
  .prod{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px}
  .prod{align-items:flex-start}
  .prod .pm{font-size:11px;color:#fff;border-radius:999px;padding:2px 8px;white-space:nowrap}
  .prod .psub{font-size:11px;color:var(--muted)}
  .pmwrap{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;align-items:center;flex:0 0 auto}
  .tag-marque{background:var(--grey)}
  .empty{background:var(--soft);border:1px dashed var(--line);border-radius:12px;padding:28px;
    text-align:center;color:var(--muted);font-size:14px}
  .count{font-size:13px;color:var(--muted);margin-bottom:14px}
  .fchips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 18px}
  .fchip{background:var(--part-bg);color:var(--part);border:1px solid var(--part);border-radius:999px;
    padding:4px 12px;font-size:12px}
  .fchip b{font-weight:700}
  .tag-pro{background:var(--pro)} .tag-part{background:var(--part)}
  .badge{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
    padding:3px 9px;border-radius:6px;margin-bottom:10px}
  .badge.pro{background:var(--pro-bg);color:var(--pro)} .badge.part{background:var(--part-bg);color:var(--part)}
  .home-hero{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .uni-card{border-radius:16px;padding:28px;color:#fff;cursor:pointer;min-height:150px;
    display:flex;flex-direction:column;justify-content:space-between;transition:.12s}
  .uni-card:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(20,30,50,.18)}
  .uni-card.pro{background:linear-gradient(135deg,#3cb045,#2c8a33)}
  .uni-card.part{background:linear-gradient(135deg,#f0652f,#d24a1d)}
  .uni-card h2{margin:0;font-size:22px;letter-spacing:.5px}
  .uni-card p{margin:6px 0 0;opacity:.9;font-size:13px}
  .uni-card .go{font-size:13px;font-weight:700;margin-top:18px}
  .note{font-size:12px;color:var(--muted);margin-top:18px;font-style:italic}
</style>
</head>
<body>

<div class="topbar">
  <img class="brand-logo" src="assets/logo-notilia.png" alt="NOTILIA Groupe" onclick="goHome()">
  <div class="proto-label"><strong>Refonte d'arborescence</strong><span>réalisé par APPO</span></div>
  <div class="switch">
    <button class="pro" id="swPro" onclick="goUniverse('pro')">Professionnel</button>
    <button class="part" id="swPart" onclick="goUniverse('part')">Particulier</button>
  </div>
</div>

<div class="layout">
  <aside>
    <h3>Filtres</h3>
    <div class="fgroup">
      <div class="ftitle">Public</div>
      <label class="fopt"><input type="checkbox" class="fPublic" value="Professionnel">Professionnel</label>
      <label class="fopt"><input type="checkbox" class="fPublic" value="Particulier">Particulier</label>
    </div>
    <div class="fgroup">
      <div class="ftitle">Catégorie</div>
      <div class="fgroup scroll" id="filterCat"></div>
    </div>
    <div class="fgroup">
      <div class="ftitle">Marque</div>
      <div id="filterMarque"></div>
    </div>
    <div class="fgroup">
      <div class="ftitle">Forme</div>
      <label class="fopt"><input type="checkbox" class="fForme" value="Liquide">Liquide</label>
      <label class="fopt"><input type="checkbox" class="fForme" value="Poudre">Poudre</label>
      <label class="fopt"><input type="checkbox" class="fForme" value="Solide">Solide</label>
    </div>
    <button class="reset" onclick="resetFilters()">Réinitialiser les filtres</button>
  </aside>

  <main>
    <div class="crumb" id="crumb"></div>
    <div id="content"></div>
  </main>
</div>

<script>
/* ---------- DONNÉES ---------- */
const MARQUES = ["Nectra","Arcyvert","Mieuxa","Supermieuxa","A l'olivier"];

// Vocabulaire de catégories UNIFIÉ (commun aux deux publics). pubs = qui l'utilise.
const CATS = [
  {name:"Linge", pubs:["Professionnel","Particulier"]},
  {name:"Sanitaires", pubs:["Professionnel","Particulier"]},
  {name:"Nettoyage & surfaces", pubs:["Professionnel","Particulier"]},
  {name:"Détartrage", pubs:["Professionnel","Particulier"]},
  {name:"Désinfection / Javel", pubs:["Professionnel","Particulier"]},
  {name:"Cuisine & alimentaire", pubs:["Professionnel"]},
  {name:"Mains & hygiène corporelle", pubs:["Professionnel"]},
  {name:"Industrie", pubs:["Professionnel"]},
  {name:"Enzyma'", pubs:["Professionnel"]},
  {name:"Excellence", pubs:["Professionnel"]},
  {name:"Canalisations & débouchage", pubs:["Particulier"]},
  {name:"Auto", pubs:["Particulier"]},
  {name:"Bricolage", pubs:["Particulier"]},
  {name:"Combustible", pubs:["Particulier"]},
  {name:"Extérieur & façades", pubs:["Particulier"]},
  {name:"Piscine", pubs:["Particulier"]},
  {name:"Air intérieur", pubs:["Particulier"]},
  {name:"Insecticide / nuisibles", pubs:["Particulier"]}
];
const GAMMES = ["Envol","Essentiel","Expert"]; // sous-niveau Pro uniquement
// Remappe les anciennes catégories Particulier vers le vocabulaire unifié
const CATMAP = {
  "Auto":"Auto","Bricolage":"Bricolage","Combustible":"Combustible","Détartrage":"Détartrage",
  "Débouchage & canalisations":"Canalisations & débouchage","Extérieur":"Extérieur & façades",
  "Linge":"Linge","Nettoyage":"Nettoyage & surfaces","Piscine":"Piscine",
  "Sanitaires":"Sanitaires","Air intérieur":"Air intérieur","Insecticide":"Insecticide / nuisibles"
};
// Produits javel ré-affectés à la catégorie commune "Désinfection / Javel"
const JAVEL = new Set(["Eau de javel 2.6%","Eau de javel concentrée 9,6%"]);

const PART = {
  "Auto":[
    ["Dégoudronnant","Mieuxa"],["Dégraissant tous métaux","Mieuxa"],
    ["Dérouillant dégrippant","Mieuxa"],["Lave-glace -10°C 4 saisons","Mieuxa"]
  ],
  "Bricolage":[
    ["Acétone","Mieuxa"],["Brou de noix","Mieuxa"],["Diluant cellulosique","Mieuxa"],
    ["Diluant synthétique","Mieuxa"],["Essence C","Mieuxa"],["Essence F","Mieuxa"],
    ["Essence de térébenthine","Mieuxa"],["Essence à la térébenthine","Mieuxa"],
    ["Huile de lin","Mieuxa"],["Huile de vaseline","Mieuxa"],["Mastic vitrier","Mieuxa"],
    ["Pétrole désaromatisé","Mieuxa"],["Siccatif","Mieuxa"],["White spirit brico","Mieuxa"],
    ["White spirit sans odeur","Mieuxa"],["Nettoyant pinceaux","Supermieuxa"],
    ["Substitut d'acétone","Supermieuxa"],["Substitut du trichloréthylène","Supermieuxa"],
    ["Substitut du white spirit","Supermieuxa"],["Acide oxalique","A l'olivier"]
  ],
  "Combustible":[
    ["Alcogel","Mieuxa"],["Alcool à brûler","Mieuxa"],["Bioflam gel","Mieuxa"]
  ],
  "Détartrage":[
    ["Acide chlorhydrique 23%","Mieuxa"],["Détartrant concentré","Mieuxa"],
    ["Vinaigre ménager 14°","Mieuxa"],["Vinaigre ménager 14° gélifié citron","Mieuxa"],
    ["Vinaigre de nettoyage 20° Ultraconcentré","Mieuxa"],
    ["Détartrant-Nettoyant Sanitaires (subst. acide chlorhydrique)","Supermieuxa"],
    ["Acide citrique","A l'olivier"]
  ],
  "Débouchage & canalisations":[
    ["Déboucheur canalisations gélifié","Mieuxa"],["Déboucheur canalisations liquide","Mieuxa"],
    ["Déboucheur canalisations à l'acide","Mieuxa"],["Lessive de soude","Mieuxa"],
    ["Soude caustique","Mieuxa"],
    ["Désodorisant-Dégraissant Canalisations (subst. soude liquide)","Supermieuxa"]
  ],
  "Extérieur":[
    ["Anti-verdissures","Mieuxa"],["Eau de javel concentrée 9,6%","Mieuxa"],
    ["Traitement anti-moisissures","Mieuxa"],["Vinaigre 9,5° Phytopharmaceutique","Mieuxa"]
  ],
  "Linge":[
    ["Eau déminéralisée","Mieuxa"],["Eau de repassage agrumes","Mieuxa"],
    ["Eau de repassage fleur d'oranger","Mieuxa"],["Eau de repassage jasmin","Mieuxa"],
    ["Eau de repassage lavande","Mieuxa"],["Eau de repassage printemps","Mieuxa"],
    ["Eau de repassage vanille","Mieuxa"]
  ],
  "Nettoyage":[
    ["Alcalia Ammoniaque pomme","Mieuxa"],["Alcool dénaturé 95°","Mieuxa"],
    ["Alcool ménager basilic","Mieuxa"],["Alcool ménager citron","Mieuxa"],
    ["Alcool ménager fraise","Mieuxa"],["Alcool ménager mandarine","Mieuxa"],
    ["Alcool ménager menthe","Mieuxa"],["Alcool ménager pomme-agrumes","Mieuxa"],
    ["Alcool ménager supérieur","Mieuxa"],["Alcool ménager vanille","Mieuxa"],
    ["Ammoniaque – Alcali","Mieuxa"],["Eau de javel 2.6%","Mieuxa"],
    ["Gel de nettoyage 14° citron","Mieuxa"],["Lessive tous travaux","Mieuxa"],
    ["Vinaigre ménager 8° framboise","Mieuxa"],["Vinaigre ménager agrumes","Mieuxa"],
    ["Vinaigre ménager pomme","Mieuxa"],["Vinaigre de nettoyage 14°","Mieuxa"],
    ["Vinaigre de nettoyage 8°","Mieuxa"],["Vinaigre de nettoyage 8° agrumes","Mieuxa"],
    ["Vinaigre de nettoyage 8° framboise","Mieuxa"],["Vinaigre de nettoyage 8° pomme","Mieuxa"],
    ["Substitut d'alcool ménager","Supermieuxa"],["Substitut d'ammoniaque","Supermieuxa"],
    ["Vinaigre ménager 8°","Supermieuxa"],["Bicarbonate de soude","A l'olivier"],
    ["Bicarbonate de soude gélifié","A l'olivier"],["Blanc de Meudon","A l'olivier"],
    ["Cristaux de soude","A l'olivier"],["Pierre d'argile citron","A l'olivier"],
    ["Savon noir liquide","A l'olivier"],["Savon noir liquide amande","A l'olivier"],
    ["Savon noir mou","A l'olivier"],["Savon noir prêt à l'emploi (PAE)","A l'olivier"],
    ["Terre de Sommières","A l'olivier"]
  ],
  "Piscine":[
    ["Acide chlorhydrique Spécial piscine (pH-)","Mieuxa"]
  ],
  "Sanitaires":[],      // Arcyvert — à compléter
  "Air intérieur":[],   // Arcyvert — à compléter
  "Insecticide":[]      // Arcyvert — à compléter
};

/* ---------- INDEX PRODUITS À PLAT (pour la recherche à facettes) ---------- */
// Forme estimée à partir du nom (la donnée forme n'est pas structurée dans la source).
function formeOf(name){
  const t=name.toLowerCase();
  if(/poudre|cristaux|bicarbonate(?!.*gélifié)|terre de sommières|blanc de meudon|pierre d'argile|acide oxalique|acide citrique|soude caustique/.test(t)) return 'Poudre';
  if(/savon noir mou|mastic|terre de sommières|blanc de meudon/.test(t)) return 'Solide';
  return 'Liquide';
}
// EXEMPLES de produits vendus aux DEUX publics (fiche unique, Public multi-valué).
// → clé = nom exact du produit Particulier ; valeur = son rattachement dans l'arbo Pro.
// À remplacer par la vraie liste fournie par le client.
const SHARED = {
  "Vinaigre de nettoyage 20° Ultraconcentré": {gamme:"Essentiel"},
  "Bicarbonate de soude": {gamme:"Envol"}
};
const ALLPROD=[];
for(const cat in PART){ PART[cat].forEach(p=>{
  const newCat = JAVEL.has(p[0]) ? "Désinfection / Javel" : (CATMAP[cat]||cat);
  const sh = SHARED[p[0]];
  ALLPROD.push({
    name:p[0], marque:p[1], cat:newCat, forme:formeOf(p[0]),
    pubs: sh ? ['Professionnel','Particulier'] : ['Particulier'],
    proGamme: sh?sh.gamme:null, shared: !!sh
  });
});}
// Produits Pro (Nectra) propres : non listés dans la source → univers Pro à compléter.

/* ---------- ÉTAT ---------- */
let state = { universe:null, proCat:null, gamme:null, categorie:null };

/* ---------- FILTRES ---------- */
function buildMarqueFilter(){
  document.getElementById('filterMarque').innerHTML = MARQUES.map(m =>
    `<label class="fopt"><input type="checkbox" class="fMarque" value="${esc(m)}">${esc(m)}</label>`).join('');
}
function buildCatFilter(){
  const opt=v=>`<label class="fopt"><input type="checkbox" class="fCat" value="${esc(v)}">${esc(v)}</label>`;
  const both=CATS.filter(c=>c.pubs.length===2).map(c=>c.name);
  const proOnly=CATS.filter(c=>c.pubs.length===1&&c.pubs[0]==='Professionnel').map(c=>c.name);
  const partOnly=CATS.filter(c=>c.pubs.length===1&&c.pubs[0]==='Particulier').map(c=>c.name);
  let h='<div class="fsub">Communes (Pro + Particulier)</div>'+both.map(opt).join('');
  h+='<div class="fsub">Professionnel</div>'+proOnly.map(opt).join('');
  h+='<div class="fsub">Particulier</div>'+partOnly.map(opt).join('');
  document.getElementById('filterCat').innerHTML=h;
}
function sel(cls){return [...document.querySelectorAll('.'+cls+':checked')].map(c=>c.value);}
function selectedMarques(){return sel('fMarque');}
function selectedPublics(){return sel('fPublic');}
function selectedCats(){return sel('fCat');}
function selectedFormes(){return sel('fForme');}
function anyFilter(){return selectedPublics().length+selectedCats().length+selectedMarques().length+selectedFormes().length>0;}
function resetFilters(){
  document.querySelectorAll('.fPublic,.fCat,.fMarque,.fForme').forEach(c=>c.checked=false);
  render();
}
document.addEventListener('change',e=>{if(e.target.matches('.fPublic,.fCat,.fMarque,.fForme'))render();});

/* ---------- NAVIGATION ---------- */
function goHome(){state={universe:null,proCat:null,gamme:null,categorie:null};render();}
function goUniverse(u){state={universe:u,proCat:null,gamme:null,categorie:null};render();}
function goProCat(c){state.proCat=c;state.gamme=null;render();}
function goGamme(g){state.gamme=g;render();}
function goCategorie(c){state.categorie=c;render();}

/* ---------- RENDU ---------- */
function render(){
  document.getElementById('swPro').classList.toggle('active',state.universe==='pro');
  document.getElementById('swPart').classList.toggle('active',state.universe==='part');
  renderCrumb();
  const c = document.getElementById('content');
  if(anyFilter()){c.innerHTML=viewFiltered();return;}
  if(!state.universe){c.innerHTML=viewHome();return;}
  if(state.universe==='pro'){
    if(!state.proCat){c.innerHTML=viewProCats();return;}
    if(!state.gamme){c.innerHTML=viewProGammes();return;}
    c.innerHTML=viewProProducts();return;
  }
  if(state.universe==='part'){
    if(!state.categorie){c.innerHTML=viewPartCategories();return;}
    c.innerHTML=viewPartProducts();return;
  }
}

function renderCrumb(){
  const parts=[`<a onclick="goHome()">Accueil</a>`];
  if(anyFilter()){
    parts.push(`<span>Résultats filtrés</span>`);
    document.getElementById('crumb').innerHTML=parts.join(' <span class="sep">›</span> ');
    return;
  }
  if(state.universe==='pro'){
    parts.push(`<a onclick="goUniverse('pro')">Professionnel</a>`);
    if(state.proCat) parts.push(`<a onclick="goProCat(${JSON.stringify(state.proCat).replace(/"/g,'&quot;')})">${esc(state.proCat)}</a>`);
    if(state.gamme) parts.push(`<span>Gamme ${esc(state.gamme)}</span>`);
  }
  if(state.universe==='part'){
    parts.push(`<a onclick="goUniverse('part')">Particulier</a>`);
    if(state.categorie) parts.push(`<span>${esc(state.categorie)}</span>`);
  }
  document.getElementById('crumb').innerHTML =
    parts.join(' <span class="sep">›</span> ');
}

function viewHome(){
  return `<h1>Catalogue NOTILIA</h1>
    <p class="lead">Choisissez un univers, ou filtrez directement à gauche par public, catégorie, marque ou forme.</p>
    <div class="home-hero">
      <div class="uni-card pro" onclick="goUniverse('pro')">
        <div><h2>PROFESSIONNEL</h2><p>Par catégorie, puis gamme (Envol · Essentiel · Expert)</p></div>
        <div class="go">Entrer →</div>
      </div>
      <div class="uni-card part" onclick="goUniverse('part')">
        <div><h2>PARTICULIER</h2><p>${catsForPublic('Particulier').length} catégories à plat, sans gamme</p></div>
        <div class="go">Entrer →</div>
      </div>
    </div>
    <p class="note">Catégories unifiées (un seul vocabulaire pour les deux publics). Public, catégorie, marque et forme sont des attributs filtrables : dès qu'un filtre est coché, le catalogue s'affiche à plat, tous univers confondus.</p>`;
}

function viewFiltered(){
  const pubs=selectedPublics(), cats=selectedCats(), marques=selectedMarques(), formes=selectedFormes();
  let res=ALLPROD.filter(p=>
    (!pubs.length||pubs.some(x=>p.pubs.includes(x))) &&
    (!cats.length||cats.includes(p.cat)) &&
    (!marques.length||marques.includes(p.marque)) &&
    (!formes.length||formes.includes(p.forme))
  );
  // Récap des filtres actifs
  const chips=[]
    .concat(pubs.map(v=>['Public',v]))
    .concat(cats.map(v=>['Catégorie',v]))
    .concat(marques.map(v=>['Marque',v]))
    .concat(formes.map(v=>['Forme',v]))
    .map(([k,v])=>`<span class="fchip"><b>${k} :</b> ${esc(v)}</span>`).join('');
  // Le Pro n'a pas encore de produits propres (hors exemples partagés) → prévenir
  const proCible = pubs.includes('Professionnel') || cats.some(c=>{const cc=CATS.find(x=>x.name===c);return cc&&cc.pubs.includes('Professionnel');});
  let proNote = proCible
    ? `<div class="empty" style="margin-bottom:16px">Côté Professionnel (Nectra), seuls les <b>produits partagés (exemple)</b> sont rattachés au Pro pour l'instant ; le reste du catalogue Nectra est à compléter.</div>` : '';

  let head=`<h1>Résultats filtrés</h1>
    <div class="fchips">${chips}</div>`;
  if(res.length===0)
    return head+proNote+`<div class="empty">Aucun produit ne correspond à cette combinaison de filtres.</div>`;
  return head+proNote+`<div class="count">${res.length} produit${res.length>1?'s':''}</div>
    <div class="plist">${res.map(prodRow).join('')}</div>`;
}

function viewProCats(){
  const cats=catsForPublic('Professionnel');
  return `<span class="badge pro">Professionnel</span>
    <h1>Catégories</h1>
    <p class="lead">Sélectionnez une catégorie. Chacune est déclinée en gammes (Envol · Essentiel · Expert).</p>
    <div class="grid">${cats.map(c=>{
      const shared=CATS.find(x=>x.name===c).pubs.length===2;
      return `<div class="card pro" onclick="goProCat(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div class="t">${esc(c)}</div>
        <div class="meta">3 gammes${shared?' · aussi côté Particulier':''}</div>
        <div class="arrow">Explorer →</div>
      </div>`;}).join('')}</div>`;
}

function viewProGammes(){
  return `<span class="badge pro">${esc(state.proCat)}</span>
    <h1>Gammes</h1>
    <p class="lead">Gammes disponibles pour « ${esc(state.proCat)} ».</p>
    <div class="grid">${GAMMES.map(g=>`
      <div class="card pro" onclick="goGamme('${g}')">
        <div class="t">Gamme ${g}</div>
        <div class="arrow">Voir les produits →</div>
      </div>`).join('')}</div>`;
}

function viewProProducts(){
  const prods=ALLPROD.filter(p=>p.cat===state.proCat && p.pubs.includes('Professionnel') && p.proGamme===state.gamme);
  const head=`<span class="badge pro">${esc(state.proCat)} › Gamme ${esc(state.gamme)}</span>
    <h1>Gamme ${esc(state.gamme)}</h1>`;
  const list = prods.length
    ? `<div class="count">${prods.length} produit${prods.length>1?'s':''} (exemple partagé Pro + Particulier)</div>
       <div class="plist">${prods.map(prodRow).join('')}</div>`
    : '';
  return head+list+`<div class="empty">
      Produits Nectra propres au Pro à compléter (la source d'origine s'arrête à la forme).${
      prods.length?' Les produits ci-dessus sont des <b>exemples</b> de produits vendus aux deux publics : même fiche, double badge.':''}
    </div>`;
}

function viewPartCategories(){
  const cats=catsForPublic('Particulier');
  return `<span class="badge part">Particulier</span>
    <h1>Catégories</h1>
    <p class="lead">Sélectionnez une catégorie (pas de gamme côté Particulier).</p>
    <div class="grid">${cats.map(c=>{
      const n=prodCount(c,'Particulier');
      const shared=CATS.find(x=>x.name===c).pubs.length===2;
      return `<div class="card part" onclick="goCategorie(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div class="t">${esc(c)}</div>
        <div class="meta">${n?n+' produit'+(n>1?'s':''):'À compléter (Arcyvert)'}${shared?' · aussi côté Pro':''}</div>
        <div class="arrow">Voir →</div>
      </div>`;}).join('')}</div>`;
}

function viewPartProducts(){
  const prods=ALLPROD.filter(p=>p.cat===state.categorie && p.pubs.includes('Particulier'));
  const head=`<span class="badge part">Particulier</span><h1>${esc(state.categorie)}</h1>`;
  if(prods.length===0)
    return head+`<div class="empty">Produits à compléter (catégorie Arcyvert non détaillée dans la source).</div>`;
  return head+`<div class="count">${prods.length} produit${prods.length>1?'s':''}</div>
    <div class="plist">${prods.map(prodRow).join('')}</div>`;
}

/* ---------- AFFICHAGE PRODUIT ---------- */
function pubTags(p){
  let h='';
  if(p.pubs.includes('Professionnel')) h+=`<span class="pm tag-pro">Pro</span>`;
  if(p.pubs.includes('Particulier'))   h+=`<span class="pm tag-part">Particulier</span>`;
  return h;
}
function prodRow(p){
  return `<div class="prod">
    <span>${esc(p.name)}<br><span class="psub">${esc(p.cat)} · ${esc(p.forme)}${p.shared?` · ⇄ aussi en Pro (exemple)`:''}</span></span>
    <span class="pmwrap"><span class="pm tag-marque">${esc(p.marque)}</span>${pubTags(p)}</span>
  </div>`;
}

/* ---------- HELPERS ---------- */
function catsForPublic(pub){return CATS.filter(c=>c.pubs.includes(pub)).map(c=>c.name);}
function prodCount(cat,pub){return ALLPROD.filter(p=>p.cat===cat&&p.pubs.includes(pub)).length;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

buildMarqueFilter();
buildCatFilter();
render();
</script>
</body>
</html>

<title>NOTILIA — Prototype de navigation</title>
<style>
  :root{

  }
  *{box-sizing:border-box}
  body{margin:0;background:#fafafa;color:var(--ink);

  /* Top bar */
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:12px 28px;
    display:flex;align-items:center;gap:24px;position:sticky;top:0;z-index:10}
  .brand-logo{height:42px;width:auto;cursor:pointer}
  .backbtn{margin-left:14px;font-size:13px;font-weight:600;text-decoration:none;color:var(--grey);
    border:1px solid var(--line);border-radius:999px;padding:8px 14px;white-space:nowrap}
  .backbtn:hover{border-color:var(--grey);background:#f4f4f4}
  .proto-label{display:flex;flex-direction:column;line-height:1.25;border-left:1px solid var(--line);padding-left:18px}
  .proto-label strong{font-size:13px;color:var(--grey);font-weight:700}
  .proto-label span{font-size:11px;color:var(--muted)}
  .brand{font-weight:800;letter-spacing:2px;font-size:18px}
  .brand small{font-weight:500;color:var(--muted);letter-spacing:.5px;font-size:11px;display:block}
  .switch{display:flex;gap:6px;margin-left:auto}
  .switch button{border:1px solid var(--line);background:#fff;border-radius:999px;
    padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
  .switch button.pro.active{background:var(--pro);color:#fff;border-color:var(--pro)}
  .switch button.part.active{background:var(--part);color:#fff;border-color:var(--part)}

  .layout{display:flex;max-width:1180px;margin:0 auto;padding:24px 28px;gap:28px;align-items:flex-start}

  /* Filters */
  aside{width:230px;flex:0 0 230px;background:#fff;border:1px solid var(--line);
    border-radius:14px;padding:18px 18px;position:sticky;top:84px}
  aside h3{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:0 0 12px}
  .fgroup{margin-bottom:18px}
  .fgroup .ftitle{font-size:12px;font-weight:700;margin-bottom:8px;color:var(--grey)}
  .fgroup.scroll{max-height:210px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px 10px}
  .fsub{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:8px 0 4px;font-weight:700}
  .fsub:first-child{margin-top:0}
  .fopt{display:flex;align-items:center;gap:8px;font-size:13px;padding:3px 0;cursor:pointer;color:#444}
  .fopt input{accent-color:var(--accent);cursor:pointer}
  .reset{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0}

  /* Main */
  main{flex:1;min-width:0}
  .crumb{font-size:13px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .crumb a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:600}
  .crumb a:hover{text-decoration:underline}
  .crumb .sep{color:#c2c8d0}
  h1{font-size:24px;margin:0 0 4px}
  .lead{color:var(--muted);font-size:14px;margin:0 0 22px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 16px;
    cursor:pointer;transition:.12s;display:flex;flex-direction:column;gap:6px}
  .card:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(20,30,50,.08);transform:translateY(-1px)}
  .card .t{font-weight:700;font-size:15px}
  .card .meta{font-size:12px;color:var(--muted)}
  .card .arrow{margin-top:auto;font-size:12px;color:var(--accent);font-weight:600}
  .card.pro{border-top:3px solid var(--pro)}
  .card.part{border-top:3px solid var(--part)}

  /* Product list */
  .plist{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
  .prod{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px}
  .prod{align-items:flex-start}
  .prod .pm{font-size:11px;color:#fff;border-radius:999px;padding:2px 8px;white-space:nowrap}
  .prod .psub{font-size:11px;color:var(--muted)}
  .pmwrap{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;align-items:center;flex:0 0 auto}
  .tag-marque{background:var(--grey)}
  .empty{background:var(--soft);border:1px dashed var(--line);border-radius:12px;padding:28px;
    text-align:center;color:var(--muted);font-size:14px}
  .count{font-size:13px;color:var(--muted);margin-bottom:14px}
  .fchips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 18px}
  .fchip{background:var(--part-bg);color:var(--part);border:1px solid var(--part);border-radius:999px;
    padding:4px 12px;font-size:12px}
  .fchip b{font-weight:700}
  .tag-pro{background:var(--pro)} .tag-part{background:var(--part)}
  .badge{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
    padding:3px 9px;border-radius:6px;margin-bottom:10px}
  .badge.pro{background:var(--pro-bg);color:var(--pro)} .badge.part{background:var(--part-bg);color:var(--part)}
  .home-hero{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .uni-card{border-radius:16px;padding:28px;color:#fff;cursor:pointer;min-height:150px;
    display:flex;flex-direction:column;justify-content:space-between;transition:.12s}
  .uni-card:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(20,30,50,.18)}
  .uni-card.pro{background:linear-gradient(135deg,#3cb045,#2c8a33)}
  .uni-card.part{background:linear-gradient(135deg,#f0652f,#d24a1d)}
  .uni-card h2{margin:0;font-size:22px;letter-spacing:.5px}
  .uni-card p{margin:6px 0 0;opacity:.9;font-size:13px}
  .uni-card .go{font-size:13px;font-weight:700;margin-top:18px}
  .note{font-size:12px;color:var(--muted);margin-top:18px;font-style:italic}
</style>
</head>

// EXEMPLES de produits Particulier aussi vendus en Pro (démo du double badge ; à confirmer client).
const SHARED = {
  "Bicarbonate de soude": {gamme:"Envol"},
  "Eau de repassage lavande": {gamme:"Essentiel"}
};
const ALLPROD=[];
// Particulier (Mieuxa, Super Mieuxa, A l'Olivier, Arcyvert)
for(const cat in PART){ PART[cat].forEach(p=>{
  const newCat = JAVEL.has(p[0]) ? "Désinfection / Javel" : (CATMAP[cat]||cat);
  const sh = SHARED[p[0]];
  ALLPROD.push({name:p[0], marque:p[1], cat:newCat, forme:formeOf(p[0]),
    gamme: sh?sh.gamme:null, pubs: sh?['Professionnel','Particulier']:['Particulier'], shared:!!sh});
});}
// Professionnel (Nectra) — vrai catalogue
PRO_RAW.forEach(a=>{ ALLPROD.push({name:a[0], marque:'Nectra', cat:a[1],
  forme:a[3]||formeOf(a[0]), gamme:a[2]||null, pubs:['Professionnel'], shared:false}); });

/* ---------- ÉTAT ---------- */
let state = { universe:null, proCat:null, categorie:null };

/* ---------- FILTRES ---------- */
function buildMarqueFilter(){
  document.getElementById('filterMarque').innerHTML = MARQUES.map(m =>
    `<label class="fopt"><input type="checkbox" class="fMarque" value="${esc(m)}">${esc(m)}</label>`).join('');
}
// Filtres conditionnels : la liste des catégories dépend du Public coché,
// et le filtre Gamme n'apparaît que si "Professionnel" est sélectionné.
function refreshConditionalFilters(){
  const pubs=selectedPublics();
  const checked=new Set(selectedCats());
  const names = pubs.length
    ? CATS.filter(c=>pubs.some(p=>c.pubs.includes(p))).map(c=>c.name)
    : CATS.map(c=>c.name);
  const opt=v=>`<label class="fopt"><input type="checkbox" class="fCat" value="${esc(v)}"${checked.has(v)?' checked':''}>${esc(v)}</label>`;
  document.getElementById('filterCat').innerHTML = names.map(opt).join('');
  const showGamme = pubs.includes('Professionnel');
  const gg=document.getElementById('gammeGroup');
  gg.style.display = showGamme ? '' : 'none';
  if(!showGamme) document.querySelectorAll('.fGamme').forEach(c=>c.checked=false);
}
function sel(cls){return [...document.querySelectorAll('.'+cls+':checked')].map(c=>c.value);}
function selectedMarques(){return sel('fMarque');}
function selectedPublics(){return sel('fPublic');}
function selectedCats(){return sel('fCat');}
function selectedFormes(){return sel('fForme');}
function selectedGammes(){return sel('fGamme');}
// "extra" = filtres autres que le Public qui mirroite l'univers en cours
function extraFilters(){return selectedCats().length+selectedMarques().length+selectedFormes().length+selectedGammes().length;}
function publicMismatch(){
  const pubs=selectedPublics();
  if(!pubs.length) return false;
  if(state.universe==='pro')  return !(pubs.length===1&&pubs[0]==='Professionnel');
  if(state.universe==='part') return !(pubs.length===1&&pubs[0]==='Particulier');
  return true; // pas d'univers mais un Public coché → résultats filtrés
}
// Bascule en "résultats filtrés" seulement si un filtre AUTRE que le Public de l'univers est actif
function anyFilter(){return extraFilters()>0 || publicMismatch();}
// Coche le Public en cohérence avec l'univers en cours (pré-filtre)
function syncPublicToUniverse(){
  const want={pro:'Professionnel',part:'Particulier'}[state.universe]||null;
  document.querySelectorAll('.fPublic').forEach(c=>{c.checked=(c.value===want);});
  refreshConditionalFilters();
}
function resetFilters(){
  document.querySelectorAll('.fCat,.fMarque,.fForme,.fGamme').forEach(c=>c.checked=false);
  syncPublicToUniverse();
  render();
}
document.addEventListener('change',e=>{
  if(e.target.matches('.fPublic')) refreshConditionalFilters();
  if(e.target.matches('.fPublic,.fCat,.fMarque,.fForme,.fGamme')) render();
});

/* ---------- NAVIGATION ---------- */
function goHome(){state={universe:null,proCat:null,categorie:null};syncPublicToUniverse();render();}
function goUniverse(u){state={universe:u,proCat:null,categorie:null};syncPublicToUniverse();render();}
function goProCat(c){state.proCat=c;render();}
function goCategorie(c){state.categorie=c;render();}

/* ---------- RENDU ---------- */
function render(){
  document.getElementById('swPro').classList.toggle('active',state.universe==='pro');
  document.getElementById('swPart').classList.toggle('active',state.universe==='part');
  renderCrumb();
  const c = document.getElementById('content');
  if(anyFilter()){c.innerHTML=viewFiltered();return;}
  if(!state.universe){c.innerHTML=viewHome();return;}
  if(state.universe==='pro'){
    if(!state.proCat){c.innerHTML=viewProCats();return;}
    c.innerHTML=viewProProducts();return;
  }
  if(state.universe==='part'){
    if(!state.categorie){c.innerHTML=viewPartCategories();return;}
    c.innerHTML=viewPartProducts();return;
  }
}

function renderCrumb(){
  const parts=[`<a onclick="goHome()">Accueil</a>`];
  if(anyFilter()){
    parts.push(`<span>Résultats filtrés</span>`);
    document.getElementById('crumb').innerHTML=parts.join(' <span class="sep">›</span> ');
    return;
  }
  if(state.universe==='pro'){
    parts.push(`<a onclick="goUniverse('pro')">Professionnel</a>`);
    if(state.proCat) parts.push(`<span>${esc(state.proCat)}</span>`);
  }
  if(state.universe==='part'){
    parts.push(`<a onclick="goUniverse('part')">Particulier</a>`);
    if(state.categorie) parts.push(`<span>${esc(state.categorie)}</span>`);
  }
  document.getElementById('crumb').innerHTML =
    parts.join(' <span class="sep">›</span> ');
}

function viewHome(){
  return `<h1>Catalogue NOTILIA</h1>
    <p class="lead">Choisissez un univers, ou filtrez directement à gauche par public, catégorie, marque ou forme.</p>
    <div class="home-hero">
      <div class="uni-card pro" onclick="goUniverse('pro')">
        <div><h2>PROFESSIONNEL</h2><p>Par catégorie · gamme (Envol · Essentiel · Expert · Excellence) en filtre</p></div>
        <div class="go">Entrer →</div>
      </div>
      <div class="uni-card part" onclick="goUniverse('part')">
        <div><h2>PARTICULIER</h2><p>${catsForPublic('Particulier').length} catégories à plat, sans gamme</p></div>
        <div class="go">Entrer →</div>
      </div>
    </div>
    <p class="note">Catégories unifiées (un seul vocabulaire pour les deux publics). Catalogue Pro = 169 produits Nectra réels. Public, catégorie, marque, forme et gamme (Pro) sont des attributs filtrables : dès qu'un filtre est coché, le catalogue s'affiche à plat, tous univers confondus.</p>`;
}

function viewFiltered(){
  const pubs=selectedPublics(), cats=selectedCats(), marques=selectedMarques(), formes=selectedFormes(), gammes=selectedGammes();
  let res=ALLPROD.filter(p=>
    (!pubs.length||pubs.some(x=>p.pubs.includes(x))) &&
    (!cats.length||cats.includes(p.cat)) &&
    (!marques.length||marques.includes(p.marque)) &&
    (!formes.length||formes.includes(p.forme)) &&
    (!gammes.length||gammes.includes(p.gamme))
  );
  // Récap des filtres actifs
  const chips=[]
    .concat(pubs.map(v=>['Public',v]))
    .concat(cats.map(v=>['Catégorie',v]))
    .concat(marques.map(v=>['Marque',v]))
    .concat(formes.map(v=>['Forme',v]))
    .concat(gammes.map(v=>['Gamme',v]))
    .map(([k,v])=>`<span class="fchip"><b>${k} :</b> ${esc(v)}</span>`).join('');
  // Le Pro n'a pas encore de produits propres (hors exemples partagés) → prévenir
  const proCible = pubs.includes('Professionnel') || cats.some(c=>{const cc=CATS.find(x=>x.name===c);return cc&&cc.pubs.includes('Professionnel');});
  let proNote = proCible
    ? `<div class="empty" style="margin-bottom:16px">Côté Professionnel (Nectra), seuls les <b>produits partagés (exemple)</b> sont rattachés au Pro pour l'instant ; le reste du catalogue Nectra est à compléter.</div>` : '';

  let head=`<h1>Résultats filtrés</h1>
    <div class="fchips">${chips}</div>`;
  if(res.length===0)
    return head+proNote+`<div class="empty">Aucun produit ne correspond à cette combinaison de filtres.</div>`;
  return head+proNote+`<div class="count">${res.length} produit${res.length>1?'s':''}</div>
    <div class="plist">${res.map(prodRow).join('')}</div>`;
}

function viewProCats(){
  const cats=catsForPublic('Professionnel');
  return `<span class="badge pro">Professionnel</span>
    <h1>Catégories</h1>
    <p class="lead">Sélectionnez une catégorie. La gamme (Envol · Essentiel · Expert · Excellence) se filtre à gauche.</p>
    <div class="grid">${cats.map(c=>{
      const shared=CATS.find(x=>x.name===c).pubs.length===2;
      const n=prodCount(c,'Professionnel');
      return `<div class="card pro" onclick="goProCat(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div class="t">${esc(c)}</div>
        <div class="meta">${n?n+' produit'+(n>1?'s':''):'À compléter'}${shared?' · aussi côté Particulier':''}</div>
        <div class="arrow">Voir →</div>
      </div>`;}).join('')}</div>`;
}

function viewProProducts(){
  const prods=ALLPROD.filter(p=>p.cat===state.proCat && p.pubs.includes('Professionnel'));
  const head=`<span class="badge pro">Professionnel</span><h1>${esc(state.proCat)}</h1>`;
  if(prods.length===0) return head+`<div class="empty">Aucun produit dans cette catégorie.</div>`;
  return head+`<div class="count">${prods.length} produit${prods.length>1?'s':''}</div>
    <div class="plist">${prods.map(prodRow).join('')}</div>`;
}

function viewPartCategories(){
  const cats=catsForPublic('Particulier');
  return `<span class="badge part">Particulier</span>
    <h1>Catégories</h1>
    <p class="lead">Sélectionnez une catégorie (pas de gamme côté Particulier).</p>
    <div class="grid">${cats.map(c=>{
      const n=prodCount(c,'Particulier');
      const shared=CATS.find(x=>x.name===c).pubs.length===2;
      return `<div class="card part" onclick="goCategorie(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div class="t">${esc(c)}</div>
        <div class="meta">${n?n+' produit'+(n>1?'s':''):'À compléter (Arcyvert)'}${shared?' · aussi côté Pro':''}</div>
        <div class="arrow">Voir →</div>
      </div>`;}).join('')}</div>`;
}

function viewPartProducts(){
  const prods=ALLPROD.filter(p=>p.cat===state.categorie && p.pubs.includes('Particulier'));
  const head=`<span class="badge part">Particulier</span><h1>${esc(state.categorie)}</h1>`;
  if(prods.length===0)
    return head+`<div class="empty">Produits à compléter (catégorie Arcyvert non détaillée dans la source).</div>`;
  return head+`<div class="count">${prods.length} produit${prods.length>1?'s':''}</div>
    <div class="plist">${prods.map(prodRow).join('')}</div>`;
}

/* ---------- AFFICHAGE PRODUIT ---------- */
function pubTags(p){
  let h='';
  if(p.pubs.includes('Professionnel')) h+=`<span class="pm tag-pro">Pro</span>`;
  if(p.pubs.includes('Particulier'))   h+=`<span class="pm tag-part">Particulier</span>`;
  return h;
}
function prodRow(p){
  return `<div class="prod">
    <span>${esc(p.name)}<br><span class="psub">${esc(p.cat)} · ${esc(p.forme)}${p.gamme?` · Gamme ${esc(p.gamme)}`:''}${p.shared?` · ⇄ aussi en Pro (exemple)`:''}</span></span>
    <span class="pmwrap"><span class="pm tag-marque">${esc(p.marque)}</span>${pubTags(p)}</span>
  </div>`;
}

/* ---------- HELPERS ---------- */
function catsForPublic(pub){return CATS.filter(c=>c.pubs.includes(pub)).map(c=>c.name);}
function prodCount(cat,pub){return ALLPROD.filter(p=>p.cat===cat&&p.pubs.includes(pub)).length;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

buildMarqueFilter();
refreshConditionalFilters();
render();
</script>
